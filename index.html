<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام تقييم الأداء الربع سنوي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d2137;--blue:#1b4a8a;--blue2:#2563b0;--blue3:#3b82f6;
  --gold:#c9973e;--gold2:#e8b84b;
  --bg:#edf1f9;--card:#fff;--text:#1a2535;--muted:#6b7a8d;--border:#dce4f0;
  --ok:#1e7e4f;--warn:#c97a1e;--err:#c0392b;
  --sh:0 2px 10px rgba(13,33,55,.08);--sh2:0 8px 32px rgba(13,33,55,.14);
  --r:12px;--rs:8px;
}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;font-size:14.5px;line-height:1.6}

/* ─── HEADER ─── */
.hdr{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);color:#fff;height:62px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh2);position:sticky;top:0;z-index:200}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{width:38px;height:38px;background:var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:var(--navy);flex-shrink:0}
.hdr-title{font-size:16px;font-weight:700;line-height:1.2}
.hdr-title small{display:block;font-size:11px;font-weight:400;opacity:.72}
.hdr-user{display:flex;align-items:center;gap:8px;font-size:13px;background:rgba(255,255,255,.12);border-radius:var(--rs);padding:5px 12px}
.hdr-user span{font-weight:600}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:var(--rs);border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:600;transition:all .18s;text-decoration:none;white-space:nowrap}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn-primary{background:var(--blue2);color:#fff}.btn-primary:hover:not(:disabled){background:var(--blue)}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover:not(:disabled){background:var(--gold2)}
.btn-outline{background:transparent;color:var(--blue2);border:1.5px solid var(--blue2)}.btn-outline:hover:not(:disabled){background:var(--blue2);color:#fff}
.btn-danger{background:var(--err);color:#fff}.btn-danger:hover:not(:disabled){background:#a93226}
.btn-ok{background:var(--ok);color:#fff}.btn-ok:hover:not(:disabled){background:#196040}
.btn-ghost{background:rgba(255,255,255,.15);color:#fff}.btn-ghost:hover:not(:disabled){background:rgba(255,255,255,.25)}
.btn-sm{padding:5px 12px;font-size:13px;border-radius:6px}
.btn-lg{padding:12px 28px;font-size:16px}
.btn-icon{padding:7px 9px;background:var(--bg);border:1px solid var(--border);color:var(--muted);font-size:16px}
.btn-icon:hover:not(:disabled){background:var(--blue2);color:#fff;border-color:var(--blue2)}

/* ─── FORMS ─── */
.fg{margin-bottom:14px}.fg:last-child{margin-bottom:0}
.fl{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px}
.fc{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:'Tajawal',sans-serif;font-size:14px;color:var(--text);background:#fff;transition:border-color .18s;direction:rtl}
.fc:focus{outline:none;border-color:var(--blue2);box-shadow:0 0 0 3px rgba(37,99,176,.1)}
.fc[readonly]{background:#f5f7fc;color:var(--muted)}
.fc[disabled]{background:#f5f7fc;color:var(--muted);cursor:not-allowed}
textarea.fc{resize:vertical;min-height:60px}
select.fc{cursor:pointer}
.fhint{font-size:12px;color:var(--muted);margin-top:3px}
.pw-wrap{position:relative}.pw-wrap .fc{padding-left:40px}
.pw-eye{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:0;line-height:1}

/* ─── CARD ─── */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.card-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-hdr h3{font-size:15px;font-weight:700;color:var(--navy)}
.cb{padding:18px}

/* ─── STATS ─── */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-bottom:20px}
.sc{background:var(--card);border-radius:var(--r);padding:18px 16px;box-shadow:var(--sh);display:flex;align-items:flex-start;gap:12px;border-right:4px solid var(--blue2)}
.sc.g{border-right-color:var(--gold)}.sc.ok{border-right-color:var(--ok)}.sc.wn{border-right-color:var(--warn)}.sc.er{border-right-color:var(--err)}
.si{width:44px;height:44px;border-radius:11px;background:rgba(37,99,176,.1);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sc.g .si{background:rgba(201,151,62,.12)}.sc.ok .si{background:rgba(30,126,79,.10)}.sc.wn .si{background:rgba(201,122,30,.10)}.sc.er .si{background:rgba(192,57,43,.10)}
.sv{font-size:27px;font-weight:800;color:var(--navy);line-height:1}
.sl{font-size:12.5px;color:var(--muted);margin-top:4px}

/* ─── TABLE ─── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{background:var(--navy);color:#fff;padding:10px 13px;text-align:right;font-weight:600;white-space:nowrap;font-size:13px}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(37,99,176,.03)}
tbody td{padding:9px 13px;vertical-align:middle}

/* ─── BADGES ─── */
.b{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600}
.b-blue{background:rgba(37,99,176,.1);color:var(--blue2)}
.b-ok{background:rgba(30,126,79,.1);color:var(--ok)}
.b-warn{background:rgba(201,122,30,.1);color:var(--warn)}
.b-err{background:rgba(192,57,43,.1);color:var(--err)}
.b-gray{background:rgba(107,122,141,.1);color:var(--muted)}
.b-gold{background:rgba(201,151,62,.12);color:#8a6010}

/* ─── TABS ─── */
.tabs{display:flex;background:#e4ecf8;border-radius:var(--rs);padding:4px;margin-bottom:18px}
.tab{flex:1;padding:7px 14px;border:none;background:none;border-radius:6px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13.5px;font-weight:600;color:var(--muted);transition:all .18s}
.tab.active{background:#fff;color:var(--navy);box-shadow:var(--sh)}

/* ─── LAYOUT ─── */
.layout{display:flex;min-height:calc(100vh - 62px)}
.sidebar{width:228px;background:var(--card);border-left:1px solid var(--border);padding:14px 0;flex-shrink:0}
.ns{padding:8px 16px 3px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;border-right:3px solid transparent}
.ni:hover{color:var(--navy);background:rgba(37,99,176,.05)}
.ni.active{color:var(--blue2);background:rgba(37,99,176,.07);border-right-color:var(--blue2)}
.ni .ico{font-size:16px}
.content{flex:1;padding:22px;overflow-y:auto}

/* ─── PAGE TITLE ─── */
.pt{font-size:21px;font-weight:800;color:var(--navy);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.pt .sub{font-size:13px;font-weight:400;color:var(--muted)}

/* ─── FORM SECTIONS (report) ─── */
.sh{background:linear-gradient(to left,var(--navy),var(--blue));color:#fff;padding:11px 18px;border-radius:var(--rs) var(--rs) 0 0;font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:8px}
.sb{border:1.5px solid var(--border);border-top:none;border-radius:0 0 var(--rs) var(--rs);padding:14px;background:#fff}
.sw{margin-bottom:18px}
.rpt-tbl table{font-size:13px}
.rpt-tbl thead th{padding:8px 10px;font-size:12.5px}
.rpt-tbl tbody td{padding:6px 8px}
.rpt-tbl .fc{padding:6px 8px;font-size:13px}
.rpt-tbl textarea.fc{min-height:52px}

/* ─── RATING STARS ─── */
.rr{display:flex;align-items:center;gap:12px;padding:10px 14px;background:rgba(37,99,176,.05);border:1px solid rgba(37,99,176,.25);border-radius:var(--rs);margin-top:10px;flex-wrap:wrap}
.rr label{font-weight:700;font-size:13.5px;white-space:nowrap}
.stars{display:flex;gap:4px}
.star{width:31px;height:31px;border-radius:50%;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#ccc;font-weight:700;padding:0}
.star.on{background:var(--gold);border-color:var(--gold);color:var(--navy)}
.star:hover:not([disabled]){border-color:var(--gold);color:var(--gold)}
.star[disabled]{cursor:default}
.rl{font-size:13px;color:var(--warn);font-weight:700;min-width:60px}

/* ─── MODAL ─── */
.ov{position:fixed;inset:0;background:rgba(13,33,55,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);animation:fIn .2s ease}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border-radius:var(--r);box-shadow:var(--sh2);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:mIn .25s ease}
.modal-lg{max-width:820px}
@keyframes mIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
.mhdr{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mhdr h3{font-size:16px;font-weight:700;color:var(--navy)}
.mcls{width:30px;height:30px;border:none;background:var(--bg);border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;line-height:1}
.mcls:hover{background:var(--border);color:var(--text)}
.mbody{padding:22px}
.mfoot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* ─── TOAST ─── */
#tc{position:fixed;bottom:24px;left:24px;z-index:9999;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none}
.toast{background:var(--card);border-radius:var(--rs);box-shadow:var(--sh2);padding:11px 16px;display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:500;border-right:4px solid var(--blue2);min-width:260px;animation:tIn .3s ease;pointer-events:auto}
.toast.ok{border-right-color:var(--ok)}.toast.err{border-right-color:var(--err)}.toast.wn{border-right-color:var(--warn)}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ─── LOGIN ─── */
.lpg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 60%,#1a3a6a 100%);padding:16px}
.lbox{background:#fff;border-radius:20px;box-shadow:var(--sh2);width:100%;max-width:400px;overflow:hidden}
.ltop{background:linear-gradient(135deg,var(--navy),var(--blue));padding:34px 28px 26px;text-align:center;color:#fff}
.llogo{width:70px;height:70px;background:var(--gold);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:var(--navy);margin:0 auto 14px}
.ltop h2{font-size:20px;font-weight:800}
.ltop p{font-size:12.5px;opacity:.72;margin-top:5px}
.lbody{padding:26px 28px 32px}
.lerr{background:rgba(192,57,43,.07);border:1px solid rgba(192,57,43,.2);border-radius:var(--rs);color:var(--err);padding:9px 13px;font-size:13px;margin-bottom:14px;display:none}

/* ─── CHARTS ─── */
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:18px;margin-bottom:20px}

/* ─── FILTER BAR ─── */
.fb{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.fb .fc{width:auto;min-width:130px}

/* ─── EMPTY STATE ─── */
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty .ei{font-size:44px;margin-bottom:10px}
.empty h4{font-size:15px;font-weight:700;color:var(--text)}
.empty p{font-size:13px;margin-top:5px}

/* ─── UTILS ─── */
.df{display:flex}.aic{align-items:center}.jcb{justify-content:space-between}.jce{justify-content:flex-end}.fw{flex-wrap:wrap}.g8{gap:8px}.g12{gap:12px}
.mb0{margin-bottom:0!important}.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}
.fw7{font-weight:700}.fw8{font-weight:800}.tc{text-align:center}.tm{color:var(--muted)}.tsm{font-size:12.5px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.dvd{border:none;border-top:1px solid var(--border);margin:14px 0}
/* ─── ROLE SELECT BUTTONS ─── */
.role-btn{border:2px solid var(--border);border-radius:var(--r);padding:16px 10px;background:#fff;cursor:pointer;text-align:center;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:600;color:var(--text);transition:all .2s;width:100%}
.role-btn:hover{border-color:var(--blue2);background:rgba(37,99,176,.04)}
.role-btn.selected{border-color:var(--blue2);background:rgba(37,99,176,.08);color:var(--navy)}
/* ─── MOBILE FORM CARDS ─── */
.mth-grid{display:flex;flex-direction:column;gap:10px}
.mth-card{border:1.5px solid var(--border);border-radius:var(--rs);overflow:hidden}
.mth-hdr{background:rgba(13,33,55,.08);padding:9px 14px;font-weight:700;font-size:13.5px;color:var(--navy);border-bottom:1px solid var(--border)}
.mth-body{padding:12px;display:grid;gap:10px}
.mth-body.d3{grid-template-columns:1fr 1fr 1fr}
.mth-body.d2{grid-template-columns:1fr 1fr}
.mf label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px}
.act-grid{display:flex;flex-direction:column;gap:10px}
.act-card{border:1.5px solid var(--border);border-radius:var(--rs);overflow:hidden}
.act-hdr{background:rgba(13,33,55,.08);padding:8px 13px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border)}
.act-num{width:24px;height:24px;background:var(--navy);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.act-ttl{font-size:13.5px;font-weight:700;color:var(--navy)}
.act-body{padding:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:640px){
  .mth-body.d3,.mth-body.d2,.act-body{grid-template-columns:1fr}
}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--muted)}
@media(max-width:768px){.sidebar{display:none}.g2,.g3{grid-template-columns:1fr}.cg{grid-template-columns:1fr}}
@media print{.hdr,.sidebar,.btn,.tabs,.fb,.no-print{display:none!important}body{background:#fff}.content{padding:0}}
</style>
</head>
<body>
<div id="app"></div>
<div id="tc"></div>

<script>
'use strict';

/* ═══════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════ */
const QRS={
  Q1:{n:'الربع الأول',  ms:['يناير','فبراير','مارس']},
  Q2:{n:'الربع الثاني', ms:['أبريل','مايو','يونيو']},
  Q3:{n:'الربع الثالث', ms:['يوليو','أغسطس','سبتمبر']},
  Q4:{n:'الربع الرابع', ms:['أكتوبر','نوفمبر','ديسمبر']}
};
const ACTS=['متابعة المناطق','متابعة المستشفيات','متابعة مشروعات التحسين',
            'إلقاء المحاضرات','تدريب المنسقين','اتمام البيانات','اخرى','','',''];
const RL={1:'ضعيف',2:'مقبول',3:'جيد',4:'جيد جداً',5:'ممتاز'};
const RLBG={1:'b-err',2:'b-warn',3:'b-gold',4:'b-blue',5:'b-ok'};
const ROLES={admin:'مسؤول النظام',manager:'رئيس القسم',employee:'موظف'};
const CY=new Date().getFullYear();
const YEARS=[CY-1,CY,CY+1];

/* ═══════════════════════════════════════════
   STORE (localStorage — no accounts needed)
═══════════════════════════════════════════ */
const S={
  K:{R:'pms_r',W:'pms_who'},
  r(){try{return JSON.parse(localStorage.getItem(this.K.R)||'[]')}catch{return[]}},
  sr(d){localStorage.setItem(this.K.R,JSON.stringify(d))},
  who(){try{return JSON.parse(localStorage.getItem(this.K.W)||'null')}catch{return null}},
  swho(d){localStorage.setItem(this.K.W,JSON.stringify(d))},
  clearWho(){localStorage.removeItem(this.K.W)}
};

/* ═══════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════ */
const Toast={
  show(msg,type='info'){
    const c=document.getElementById('tc');
    const ico={info:'ℹ️',ok:'✅',err:'❌',wn:'⚠️'};
    const d=document.createElement('div');
    d.className=`toast ${type}`;
    d.innerHTML=`<span>${ico[type]||'ℹ️'}</span><span>${msg}</span>`;
    c.appendChild(d);
    setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity .3s';setTimeout(()=>d.remove(),320)},3200);
  }
};
function openModal(html,cls=''){
  closeModal();
  const ov=document.createElement('div');
  ov.className='ov';ov.id='_ov';
  ov.innerHTML=`<div class="modal ${cls}">${html}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal()});
  document.body.appendChild(ov);
}
function closeModal(){const e=document.getElementById('_ov');if(e)e.remove()}
function confirmDlg(msg,cb,btnLabel='تأكيد الحذف',btnCls='btn-danger'){
  openModal(`
    <div class="mhdr"><h3>⚠️ تأكيد</h3><button class="mcls" onclick="closeModal()">×</button></div>
    <div class="mbody"><p style="font-size:15px">${msg}</p></div>
    <div class="mfoot">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">إلغاء</button>
      <button class="btn ${btnCls} btn-sm" id="_cyes">${btnLabel}</button>
    </div>`);
  document.getElementById('_cyes').onclick=()=>{closeModal();cb()};
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
const H={
  uid(){return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,5)},
  fd(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('ar-EG',{year:'numeric',month:'short',day:'numeric'})},
  stBdg(s){
    const m={draft:['b-gray','مسودة'],submitted:['b-blue','مُرسَل'],rated:['b-ok','مُقيَّم']};
    const[c,t]=m[s]||['b-gray',s];return`<span class="b ${c}">${t}</span>`
  },
  rtBdg(r){
    if(!r)return'<span class="b b-gray">لم يُقيَّم</span>';
    return`<span class="b ${RLBG[r]||'b-gray'}">${r}★ ${RL[r]||''}</span>`
  },
  roleBdg(r){
    const m={admin:'b-gold',manager:'b-blue',employee:'b-gray'};
    return`<span class="b ${m[r]||'b-gray'}">${ROLES[r]||r}</span>`
  },
  scoreClr(s){if(!s)return'var(--muted)';if(s<2)return'var(--err)';if(s<3)return'var(--warn)';if(s<4)return'var(--blue2)';return'var(--ok)'},
  calcScore(r){
    const vs=[r.d?.rating,r.m?.rating,r.aRating].filter(v=>v!=null);
    if(!vs.length)return null;
    return(vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(1)
  },
  emptyRpt(eId,eName,q,y){
    return{
      id:this.uid(),employeeId:eId,employeeName:eName,quarter:q,year:y,
      status:'draft',createdAt:new Date().toISOString(),submittedAt:null,ratedAt:null,
      d:{m1:{l:'',p:'',t:''},m2:{l:'',p:'',t:''},m3:{l:'',p:'',t:''},rating:null},

/* ═══════════════════════════════════════════
   MARKDOWN REPORT BUILDER
═══════════════════════════════════════════ */
function buildMD(rpt){
  const q=QRS[rpt.quarter]||{n:rpt.quarter,ms:['شهر 1','شهر 2','شهر 3']};
  const L=[];
  const ln=s=>L.push(s);
  ln('# تقرير تقييم أداء ربع سنوي');ln('');ln('---');ln('');
  ln('| البيان | التفاصيل |');
  ln('|:-------|:---------|');
  ln(`| **اسم الموظف** | ${rpt.employeeName} |`);
  ln(`| **الربع** | ${q.n} |`);
  ln(`| **السنة** | ${rpt.year} |`);
  const sd=rpt.submittedAt?new Date(rpt.submittedAt).toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'}):'—';
  ln(`| **تاريخ الإرسال** | ${sd} |`);
  const stMap={rated:'مُقيَّم ✅',submitted:'مُرسَل 📤',draft:'مسودة 📝'};
  ln(`| **الحالة** | ${stMap[rpt.status]||rpt.status} |`);
  ln('');ln('---');ln('');
  // Section 1
  ln('## أولاً: معيار الانضباط الإداري');ln('');
  ln('| الشهر | الإجازات (عارضة / اعتيادي) | الأذونات | التأخيرات |');
  ln('|:------|:---------------------------|:---------|:----------|');
  ['m1','m2','m3'].forEach((mk,i)=>{
    const d=rpt.d[mk]||{};
    ln(`| **${q.ms[i]}** | ${d.l||'—'} | ${d.p||'—'} | ${d.t||'—'} |`);
  });
  ln('');ln('---');ln('');
  // Section 2
  ln('## ثانياً: المأموريات');ln('');
  ln('| الشهر | مأموريات التقييم (سكور) + المنشآت | المأموريات الخاصة + المنشآت |');
  ln('|:------|:----------------------------------|:----------------------------|');
  ['m1','m2','m3'].forEach((mk,i)=>{
    const m=rpt.m[mk]||{};
    ln(`| **${q.ms[i]}** | ${(m.ev||'—').replace(/\n/g,' ◆ ')} | ${(m.sp||'—').replace(/\n/g,' ◆ ')} |`);
  });
  ln('');ln('---');ln('');
  // Section 3
  ln('## ثالثاً: الإنجازات');ln('');
  ln('| م | عنوان النشاط | مدة التنفيذ | خطوات التنفيذ | النتائج |');
  ln('|:--|:------------|:-----------|:-------------|:--------|');
  rpt.a.forEach(a=>{
    if(a.title||a.dur||a.steps||a.res){
      ln(`| ${a.id} | ${a.title||'—'} | ${a.dur||'—'} | ${(a.steps||'—').replace(/\n/g,' ◆ ')} | ${(a.res||'—').replace(/\n/g,' ◆ ')} |`);
    }
  });
  ln('');ln('---');ln('');
  // Ratings
  if(rpt.status==='rated'){
    ln('## نتيجة التقييم');ln('');
    ln('| القسم | النجوم | التوصيف |');
    ln('|:------|:-------|:--------|');
    const st=r=>r?('★'.repeat(r)+'☆'.repeat(5-r)):'—';
    ln(`| الانضباط الإداري | ${st(rpt.d?.rating)} | ${RL[rpt.d?.rating]||'—'} |`);
    ln(`| المأموريات | ${st(rpt.m?.rating)} | ${RL[rpt.m?.rating]||'—'} |`);
    ln(`| الإنجازات | ${st(rpt.aRating)} | ${RL[rpt.aRating]||'—'} |`);
    ln(`| **التقييم الكلي** | **${rpt.overallScore||'—'} / 5** | **${RL[Math.round(+rpt.overallScore)]||'—'}** |`);
    if(rpt.mgrNotes){ln('');ln(`> **ملاحظات المشرف:** ${rpt.mgrNotes}`);}
    ln('');ln('---');ln('');
  }
  const today=new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'});
  ln(`*صادر من نظام تقييم الأداء الربع سنوي — ${today}*`);
  return L.join('\n');
}

    const rpt=this.collect();if(!rpt)return;
    const rs=S.r().filter(r=>r.id!==rpt.id);rs.push(rpt);S.sr(rs);
    Toast.show('تم حفظ المسودة ✓','ok');this._rpt=rpt;

  submit(){
    const rpt=this.collect();if(!rpt)return;
    confirmDlg('هل تريد إرسال التقرير؟ لن تتمكن من تعديله بعد الإرسال.',()=>{
      rpt.status='submitted';rpt.submittedAt=new Date().toISOString();
      const rs=S.r().filter(r=>r.id!==rpt.id);rs.push(rpt);S.sr(rs);
      Toast.show('تم إرسال التقرير بنجاح 🎉','ok');

      const cnt=S.r().filter(r=>r.employeeId===s.id).length;
      const tmy=document.getElementById('tMy');if(tmy)tmy.textContent=`📋 تقاريري (${cnt})`;

  // ── EXPORT / SHARE ──
  _rptById(id){return id?S.r().find(r=>r.id===id):this._rpt},

  _fname(rpt,ext){
    return `تقرير_${rpt.employeeName}_${QRS[rpt.quarter]?.n||rpt.quarter}_${rpt.year}.${ext}`;
  },

  _pkg(rpt){
    return JSON.stringify({version:'1.0',type:'pms_report',exportedAt:new Date().toISOString(),report:rpt},null,2);
  },

  _dl(blob,fname){
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},150);
  },

  exportJSON(id){
    const rpt=this._rptById(id);if(!rpt)return;
    this._dl(new Blob([this._pkg(rpt)],{type:'application/json'}),this._fname(rpt,'json'));
    Toast.show('تم تنزيل ملف JSON — شاركه مع المشرف عبر واتساب','ok');
  },

  exportMD(id){
    const rpt=this._rptById(id);if(!rpt)return;
    // BOM for Arabic text files to display correctly
    this._dl(new Blob(['\ufeff'+buildMD(rpt)],{type:'text/plain;charset=utf-8'}),this._fname(rpt,'md'));
    Toast.show('تم تنزيل الملف النصي','ok');
  },

  async share(id){
    const rpt=this._rptById(id);if(!rpt)return;
    const json=this._pkg(rpt);
    const fname=this._fname(rpt,'json');
    // Step 1 — always download the file first (reliable on all devices)
    this._dl(new Blob([json],{type:'application/json'}),fname);
    // Step 2 — show clear WhatsApp instructions modal
    this._showShareInstructions(fname);
  },

  _showShareInstructions(fname){
    const steps=[
      'افتح تطبيق واتساب',
      'اختر محادثة المشرف',
      'اضغط على أيقونة المرفق 📎',
      'اختر <strong>ملف</strong> أو <strong>مستند</strong>',
      `ابحث في مجلد <strong>التنزيلات</strong> عن:<br><code style="font-size:11px;background:#eef;padding:2px 6px;border-radius:4px;direction:ltr;display:inline-block;margin-top:3px">${fname}</code>`,
      'اضغط إرسال ✅'
    ];
    openModal(`
    <div class="mhdr">
      <h3>📱 إرسال التقرير عبر واتساب</h3>
      <button class="mcls" onclick="closeModal()">×</button>
    </div>
    <div class="mbody">
      <div style="background:rgba(30,126,79,.08);border:1.5px solid rgba(30,126,79,.3);border-radius:var(--rs);padding:14px 16px;text-align:center;margin-bottom:18px">
        <div style="font-size:32px;margin-bottom:4px">✅</div>
        <p class="fw7" style="color:var(--ok);font-size:15px">تم تنزيل الملف بنجاح!</p>
        <p class="tm tsm mt4">ابحث عنه في مجلد التنزيلات</p>
      </div>
      <p class="fw7 mb10" style="font-size:14px">الآن أرسله للمشرف خطوة بخطوة:</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${steps.map((s,i)=>`
        <div style="display:flex;align-items:flex-start;gap:10px;background:var(--bg);padding:10px 12px;border-radius:var(--rs)">
          <span style="background:var(--navy);color:#fff;border-radius:50%;width:26px;height:26px;min-width:26px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800">${i+1}</span>
          <span style="font-size:13.5px;line-height:1.5">${s}</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="mfoot" style="justify-content:space-between;flex-wrap:wrap;gap:8px">
      <a class="btn btn-gold" href="whatsapp://send" target="_blank" rel="noopener" onclick="EC._wa(event)">📱 افتح واتساب الآن</a>
      <div class="df g8">
        <button class="btn btn-outline btn-sm" onclick="EC.exportJSON();closeModal()">↻ تنزيل مجدداً</button>
        <button class="btn btn-primary btn-sm" onclick="closeModal()">تم</button>
      </div>
    </div>`);
  },

  shareById(id){this.share(id)},

  // Open WhatsApp reliably across Android/iOS/browsers
  _wa(e){
    if(e) e.preventDefault();
    // Create a hidden anchor and programmatically click it —
    // this bypasses the browser's pop-up blocker that often
    // swallows custom-scheme navigation from existing <a> elements
    const schemes = [
      'whatsapp://send',   // standard scheme
      'whatsapp://',       // fallback scheme
    ];
    let launched = false;
    for(const s of schemes){
      try{
        const a = document.createElement('a');
        a.href = s;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        launched = true;
        break;
      }catch(_){}
    }
    // If all schemes failed (desktop / WhatsApp not installed)
    // open WhatsApp Web as last resort
    if(!launched){
      window.open('https://web.whatsapp.com/','_blank','noopener');
    }
  }
};

  nav(n){

  drawCharts(qr,emps){
    const f={family:'Tajawal',size:11};
    const months=QRS[this.sQ].ms;
    const sub=qr.filter(r=>r.status!=='draft');

    // Chart 1: Status donut
    const c1=document.getElementById('cS');
    if(c1){
      const nd=Math.max(0,emps.length-qr.length);
      const dr=qr.filter(r=>r.status==='draft').length;
      const su=qr.filter(r=>r.status==='submitted').length;
      const rt=qr.filter(r=>r.status==='rated').length;
      this._charts.push(new Chart(c1,{type:'doughnut',
        data:{labels:['لم يُرسَل','مسودة','مُرسَل','مُقيَّم'],
          datasets:[{data:[nd,dr,su,rt],backgroundColor:['#dce4f0','#6b7a8d','#2563b0','#1e7e4f'],borderWidth:0}]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{position:'bottom',labels:{font:f,padding:10}}}}
      }));
    }

    // Chart 2: Score distribution
    const c2=document.getElementById('cR');
    if(c2){
      const rt=qr.filter(r=>r.status==='rated'&&r.overallScore);
      const bins=[0,0,0,0,0];
      rt.forEach(r=>{const v=Math.round(+r.overallScore);if(v>=1&&v<=5)bins[v-1]++});
      this._charts.push(new Chart(c2,{type:'bar',
        data:{labels:Object.values(RL),datasets:[{label:'موظفون',data:bins,
          backgroundColor:['#c0392b','#e8941a','#c9973e','#2563b0','#1e7e4f'],borderRadius:6}]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:f}},x:{ticks:{font:f}}}}
      }));
    }

    // Chart 3: Discipline
    const c3=document.getElementById('cD');
    if(c3){
      const parse=(v)=>parseInt(v)||0;
      const lv=['m1','m2','m3'].map(mk=>sub.reduce((s,r)=>s+parse(r.d[mk]?.l),0));
      const pv=['m1','m2','m3'].map(mk=>sub.reduce((s,r)=>s+parse(r.d[mk]?.p),0));
      const tv=['m1','m2','m3'].map(mk=>sub.reduce((s,r)=>s+parse(r.d[mk]?.t),0));
      this._charts.push(new Chart(c3,{type:'bar',
        data:{labels:months,datasets:[
          {label:'إجازات',data:lv,backgroundColor:'rgba(37,99,176,.7)',borderRadius:4},
          {label:'أذونات',data:pv,backgroundColor:'rgba(201,151,62,.7)',borderRadius:4},
          {label:'تأخيرات',data:tv,backgroundColor:'rgba(192,57,43,.65)',borderRadius:4}]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{position:'bottom',labels:{font:f,padding:10}}},
          scales:{y:{beginAtZero:true,ticks:{font:f}},x:{ticks:{font:f}}}}
      }));
    }

    // Chart 4: Missions (count first number from text, fallback 1 if text is non-empty)
    const c4=document.getElementById('cM');
    if(c4){
      const cnt=txt=>{const m=(txt||'').match(/(\d+)/);return m?+m[1]:(txt.trim()?1:0)};
      const ev=['m1','m2','m3'].map(mk=>sub.reduce((s,r)=>s+cnt(r.m[mk]?.ev),0));
      const sp=['m1','m2','m3'].map(mk=>sub.reduce((s,r)=>s+cnt(r.m[mk]?.sp),0));
      this._charts.push(new Chart(c4,{type:'bar',
        data:{labels:months,datasets:[
          {label:'مأموريات التقييم',data:ev,backgroundColor:'rgba(37,99,176,.7)',borderRadius:4},
          {label:'المأموريات الخاصة',data:sp,backgroundColor:'rgba(201,151,62,.7)',borderRadius:4}]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{position:'bottom',labels:{font:f,padding:10}}},
          scales:{y:{beginAtZero:true,ticks:{font:f}},x:{ticks:{font:f}}}}
      }));
    }
  },

            </tr>`).join('')}</tbody>
          </table></div>
          <div class="rr mt8">
            <label>التقييم:</label>
            <div class="stars" id="sdR">${[1,2,3,4,5].map(i=>`<button class="star${i<=(r.d.rating||0)?' on':''}" ${!canRate?'disabled':''} onclick="${canRate?`MC.setR('d',${i})`:''}">★</button>`).join('')}</div>
            <span class="rl" id="sdL">${RL[r.d.rating]||''}</span>
          </div>
        </div>
      </div>

      <!-- Section 2 -->
      <div class="sw">
        <div class="sh">ثانياً: المأموريات</div>
        <div class="sb">
          <div class="tw" style="font-size:13px"><table>
            <thead><tr><th>الشهر</th><th>مأموريات التقييم + المنشآت</th><th>المأموريات الخاصة + المنشآت</th></tr></thead>
            <tbody>${['m1','m2','m3'].map((mk,i)=>`<tr>
              <td><strong>${months[i]}</strong></td>
              <td style="white-space:pre-wrap;max-width:240px">${r.m[mk]?.ev||'—'}</td>
              <td style="white-space:pre-wrap;max-width:240px">${r.m[mk]?.sp||'—'}</td>
            </tr>`).join('')}</tbody>
          </table></div>
          <div class="rr mt8">
            <label>التقييم:</label>
            <div class="stars" id="smR">${[1,2,3,4,5].map(i=>`<button class="star${i<=(r.m.rating||0)?' on':''}" ${!canRate?'disabled':''} onclick="${canRate?`MC.setR('m',${i})`:''}">★</button>`).join('')}</div>
            <span class="rl" id="smL">${RL[r.m.rating]||''}</span>
          </div>
        </div>
      </div>

      <!-- Section 3 -->
      <div class="sw">
        <div class="sh">ثالثاً: الإنجازات</div>
        <div class="sb">
          <div class="tw" style="font-size:13px"><table>
            <thead><tr><th style="width:30px">م</th><th>النشاط</th><th>المدة</th><th>خطوات التنفيذ</th><th>النتائج</th></tr></thead>
            <tbody>${r.a.filter(a=>a.title||a.dur||a.steps||a.res).map(a=>`<tr>
              <td class="tc tm">${a.id}</td>
              <td><strong>${a.title||'—'}</strong></td>
              <td>${a.dur||'—'}</td>
              <td style="white-space:pre-wrap;max-width:200px">${a.steps||'—'}</td>
              <td style="white-space:pre-wrap;max-width:200px">${a.res||'—'}</td>
            </tr>`).join('')}</tbody>
          </table></div>
          <div class="rr mt8">
            <label>التقييم:</label>
            <div class="stars" id="saR">${[1,2,3,4,5].map(i=>`<button class="star${i<=(r.aRating||0)?' on':''}" ${!canRate?'disabled':''} onclick="${canRate?`MC.setR('a',${i})`:''}">★</button>`).join('')}</div>
            <span class="rl" id="saL">${RL[r.aRating]||''}</span>
          </div>
        </div>
      </div>

      ${canRate?`
      <div class="fg"><label class="fl">📝 ملاحظات المشرف</label>
        <textarea class="fc" id="mNotes" placeholder="أضف ملاحظاتك حول أداء الموظف...">${r.mgrNotes||''}</textarea>
      </div>`:(r.mgrNotes?`<div class="rr" style="flex-direction:column;align-items:flex-start">
        <label class="fw7 mb4">📝 ملاحظات المشرف</label><p style="font-size:13.5px">${r.mgrNotes}</p>
      </div>`:'') }
    </div>
    ${canRate?`<div class="mfoot">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">إغلاق</button>
      <button class="btn btn-gold" onclick="MC.saveRating('${id}')">💾 حفظ التقييم</button>
    </div>`:`<div class="mfoot">
      <button class="btn btn-outline btn-sm" onclick="window.print()">🖨️ طباعة</button>
      <button class="btn btn-primary btn-sm" onclick="closeModal()">إغلاق</button>
    </div>`}
    `,'modal-lg');
  },

  setR(sec,val){
    this._ratingBuf[sec]=val;
    const ids={d:'sdR',m:'smR',a:'saR'};
    const lbls={d:'sdL',m:'smL',a:'saL'};
    const el=document.getElementById(ids[sec]);
    const ll=document.getElementById(lbls[sec]);
    if(el)el.querySelectorAll('.star').forEach((b,i)=>{b.className='star'+(i+1<=val?' on':'')});
    if(ll)ll.textContent=RL[val]||'';
  },

  saveRating(id){
    const{d,m,a}=this._ratingBuf;
    if(!d||!m||!a){Toast.show('يرجى تقييم جميع الأقسام الثلاثة','wn');return}
    const r=S.r().find(r=>r.id===id);if(!r)return;
    r.d.rating=d;r.m.rating=m;r.aRating=a;
    r.status='rated';r.ratedAt=new Date().toISOString();
    r.overallScore=((d+m+a)/3).toFixed(1);
    r.mgrNotes=document.getElementById('mNotes')?.value||'';
    S.sr(S.r().map(x=>x.id===id?r:x));
    Toast.show('تم حفظ التقييم بنجاح ✓','ok');
    closeModal();setTimeout(()=>this.nav(this.cNav),100);
  },

  // ── IMPORT ──
  importReport(){
    const inp=document.createElement('input');
    inp.type='file';inp.accept='.json';
    inp.onchange=e=>{
      const f=e.target.files[0];if(!f)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const data=JSON.parse(ev.target.result);
          // Validate structure
          if(data.type!=='pms_report'||!data.report||!data.report.employeeName){
            Toast.show('الملف غير صحيح — تأكد أنه مُصدَّر من هذا النظام','err');return;
          }
          const r={...data.report};
          // Force submitted status (not draft)
          if(r.status==='draft'){r.status='submitted';}
          if(!r.submittedAt)r.submittedAt=new Date().toISOString();
          const rpts=S.r();
          const idx=rpts.findIndex(x=>x.id===r.id);
          if(idx>=0){
            if(rpts[idx].status==='rated'){
              Toast.show(`تقرير ${r.employeeName} مُقيَّم بالفعل ولا يمكن الاستبدال`,'wn');return;
            }
            rpts[idx]=r;
            Toast.show(`🔄 تم تحديث تقرير ${r.employeeName} — ${QRS[r.quarter]?.n||r.quarter} ${r.year}`,'ok');
          }else{
            rpts.push(r);
            Toast.show(`✅ تم استيراد تقرير ${r.employeeName} — ${QRS[r.quarter]?.n||r.quarter} ${r.year}`,'ok');
          }
          S.sr(rpts);
          setTimeout(()=>this.nav(this.cNav),200);
        }catch(err){
          Toast.show('خطأ في قراءة الملف — تأكد من صحة الملف','err');
        }
      };
      reader.readAsText(f);
    };
    inp.click();
  }
};



/* ═══════════════════════════════════════════
   APP ROUTER
═══════════════════════════════════════════ */
const App={
  init(){
    const w=S.who();
    if(!w){this.go('who');return;}
    this.go(w.role);
  },
  go(view){
    const app=document.getElementById('app');
    if(view==='who'){
      app.innerHTML=whoView();Who._role=null;
    }else if(view==='employee'){
      app.innerHTML=empShell();EC.renderForm();
    }else if(view==='manager'){
      app.innerHTML=mgrShell();MC.renderDash();
    }
  }
};

App.init();

</script>
</body>
</html>
